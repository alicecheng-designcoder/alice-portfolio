<!--
  ============================================================================
  欄位視覺對照頁（U25 2026-07-20 使用者需求）——單檔自足 HTML demo（預覽版，非過閘依據）
  生成日：2026-07-20
  資料來源（單一真相鏡像）：
    1. pipeline/write_xlsx.js v6——P1COLS 欄位定義（代號/欄名/權限/下拉枚舉）＋P0 模組堆疊×欄位區對照

  日後同步方式：
    - write_xlsx.js P1COLS/ENUMS/P0 堆疊表改版時，同步更新下方 <script> 內
      ENUMS / NOTE_MAP / buildP1Fields() / MODULES（欄位順序與欄名須與 P1COLS 逐字一致，

<style>
  :root{
    --ink:#222; --sub:#666; --line:#e3e0da; --bg:#f7f5f1; --card:#fff;
    --accent:#0f6b5c; --hot:#ff5c35; --flash:#ffd54d;
    /* 權限色＝write_xlsx.js FILL 逐字鏡像 */
    --perm-lock:#D9D9D9; --perm-write:#FFF2CC; --perm-pick:#D0E0F0; --perm-sys:#EAD1DC;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;height:100%}
  body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
  header.app{background:#fff;border-bottom:1px solid var(--line);padding:10px 16px 8px;flex:none}

  .posline{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.6}
  .posline b{color:#444}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px}
  .toolbar .grp{display:flex;align-items:center;gap:5px}
  .toolbar label{font-size:11px;color:var(--sub);white-space:nowrap}
  .toolbar input[type=text]{font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;min-width:150px}
  #url-input{flex:1;min-width:260px;font-family:ui-monospace,Menlo,monospace}
  .btn{font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:#bbb}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{font-size:12px;padding:5px 10px;border:0;background:#fff;cursor:pointer;border-left:1px solid var(--line);white-space:nowrap}
  .seg button:first-child{border-left:0}
  .seg button.on{background:var(--accent);color:#fff}
  #status-bar{font-size:12px;padding:6px 16px;border-bottom:1px solid var(--line);background:#eef4f2;color:#1c4f45;flex:none;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  #status-bar.warn{background:#fff6e8;color:#7a4b00}
  #status-bar .dot{width:8px;height:8px;border-radius:50%;background:#2e9e7e;flex:none}
  #status-bar.warn .dot{background:#e09a2f}
  main{flex:1;display:flex;min-height:0}
  /* ── 左：檢視區 ── */
  #viewer{flex:1;min-width:0;position:relative;overflow:auto;background:#dedbd4;padding:14px}
  #stage{position:relative;margin:0 auto;background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.12)}
  #stage.desktop{width:1200px}
  #stage.mobile{width:390px}
  #frame{display:block;width:100%;border:0;background:#fff}
  #shot-img{display:block;width:100%}
  #overlay{position:absolute;inset:0;pointer-events:none;z-index:5}
  .obox{position:absolute;border:2px solid rgba(15,107,92,.85);background:rgba(15,107,92,.07);border-radius:4px;transition:background .15s,border-color .15s}
  .obox.hot{border-color:var(--hot);background:rgba(255,92,53,.14);z-index:2}
  .obox.flash{animation:oflash 1.6s ease}
  @keyframes oflash{0%,60%{border-color:var(--flash);background:rgba(255,213,77,.32);box-shadow:0 0 0 4px rgba(255,213,77,.5)}100%{}}
  .obadge{position:absolute;top:0;left:0;transform:translateY(-1px);pointer-events:auto;cursor:pointer;font-size:11px;line-height:1;padding:4px 8px;background:rgba(15,107,92,.92);color:#fff;border-radius:3px 0 6px 0;white-space:nowrap;max-width:96%;overflow:hidden;text-overflow:ellipsis}
  .obadge b{font-weight:700}
  .obox.hot .obadge{background:var(--hot)}
  /* ── 右：欄位面板 ── */
  #panel{width:400px;flex:none;border-left:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;min-height:0}
  #panel-head{flex:none;padding:10px 12px 8px;border-bottom:1px solid var(--line);background:#fbfaf7}
  #panel-head .stats{font-size:11px;color:var(--sub);line-height:1.7}
  #panel-head .stats b{color:var(--ink)}
  .legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .legend span{font-size:10.5px;padding:2px 7px;border-radius:4px;border:1px solid rgba(0,0,0,.12)}
  #field-search{width:100%;margin-top:8px;font-size:12px;padding:6px 9px;border:1px solid var(--line);border-radius:6px}
  #groups{flex:1;overflow-y:auto;min-height:0;padding:8px 10px 30px}
  .gcard{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:#fff;overflow:hidden}
  .gcard.hl{border-color:var(--hot);box-shadow:0 0 0 2px rgba(255,92,53,.25)}
  .ghead{display:flex;align-items:baseline;gap:6px;padding:8px 10px;background:#f4f2ec;cursor:pointer;user-select:none}
  .gcard.linked .ghead:hover{background:#ece9e0}
  .ghead .ord{font-size:10px;color:#fff;background:#8b877d;border-radius:4px;padding:2px 5px;flex:none}
  .ghead .gtitle{font-size:13px;font-weight:700}
  .ghead .gbadge{font-size:10.5px;color:var(--accent);font-weight:600;margin-left:auto;white-space:nowrap}
  .ghead .jump{font-size:10px;color:var(--sub);flex:none}
  .gnote{font-size:11px;color:var(--sub);padding:6px 10px;border-top:1px dashed var(--line);line-height:1.7}
  .frow{display:flex;gap:8px;padding:6px 10px;border-top:1px solid #f0eee8;align-items:flex-start}
  .frow.hl{background:#fff1ec}
  .frow.dim{display:none}
  .fcode{flex:none;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:4px;border:1px solid rgba(0,0,0,.14);min-width:44px;text-align:center;font-family:ui-monospace,Menlo,monospace}
  .fmain{min-width:0;flex:1}
  .fname{font-size:12px;font-weight:600;line-height:1.4}
  .fname .pos{font-size:10px;color:#999;font-weight:400;font-family:ui-monospace,Menlo,monospace;margin-left:5px}
  .fnote{font-size:11px;color:var(--sub);line-height:1.6;margin-top:1px}
  .fnote .enum{color:#3a6ea5}
  .frow.proposal{background:#fbf8ff}
  .frow.proposal .fcode{border-style:dashed}
  .ptag{font-size:9.5px;color:#6a3fa0;border:1px dashed #b79ad6;border-radius:4px;padding:0 4px;margin-left:5px}
  .p-lock{background:var(--perm-lock)} .p-write{background:var(--perm-write)} .p-pick{background:var(--perm-pick)} .p-sys{background:var(--perm-sys)}
  #groups .foot{font-size:10.5px;color:#999;line-height:1.7;padding:10px 4px}
</style>

<body>

<header class="app">
  <h1>欄位視覺對照｜Google Sheets ↔ 活動頁模組 <span class="pv">預覽版・非過閘依據</span></h1>
  <div class="posline">
    <b>本頁定位：</b>欄位視覺對照＝P0 資訊架構分頁的視覺版（所見即所得）——左邊看活動頁模組、右邊看對應 Google Sheets 欄位；
    <b>規格真相仍在 03_GoogleSheets_Schema_v1.md</b>，欄位定義鏡像自 write_xlsx.js P1COLS（生成日 2026-07-20）。
    「預覽版」語彙紀律：本頁一切標註與欄位置皆為示意，<b>不作為建置過閘依據</b>。
  </div>
  <div class="toolbar">
    <div class="grp" style="flex:1;min-width:300px">
      <label>活動頁網址</label>
      <input id="url-input" type="text" spellcheck="false">
      <button class="btn" id="preset-online" title="部署後同源相對路徑（可即時標註）">預設：線上同源</button>
      <button class="btn" id="preset-local" title="本機相對路徑（file:// 受瀏覽器安全限制，多半無法同源標註）">預設：本機檔案</button>
      <button class="btn primary" id="btn-load">載入</button>
    </div>
    <div class="grp"><label>模式</label>
      <div class="seg" id="seg-mode">
        <button data-mode="iframe">iframe</button>
        <button data-mode="shots">截圖</button>
      </div>
    </div>
    <div class="grp"><label>資料集</label>
      <div class="seg" id="seg-dataset">
        <button data-ds="lecreuset">LC</button><button data-ds="camping">露營</button><button data-ds="keyboard">鍵盤</button><button data-ds="fashion">女裝</button><button data-ds="titanium">鈦</button>
      </div>
    </div>
    <div class="grp"><label>裝置</label>
      <div class="seg" id="seg-device">
        <button data-dev="desktop">desktop 1200</button><button data-dev="mobile">mobile 390</button>
      </div>

  </div>
</header>

<div id="status-bar"><span class="dot"></span><span id="status-text">初始化…</span></div>

<main>
  <div id="viewer">
    <div id="stage" class="desktop">
      <iframe id="frame" title="活動頁預覽" hidden></iframe>
      <img id="shot-img" alt="活動頁全頁截圖" hidden>
      <div id="overlay"></div>
    </div>
  </div>

  <aside id="panel">
    <div id="panel-head">
      <div class="stats" id="panel-stats"></div>
      <div class="legend">
        <span class="p-lock">🔒 真值鎖定</span><span class="p-write">✍️ 文案可修</span><span class="p-pick">🎚 開關/選擇</span><span class="p-sys">sys 系統欄</span>
      </div>
      <input id="field-search" type="text" placeholder="搜尋欄位（代號／欄名／說明）…">
    </div>
    <div id="groups"></div>

</main>

<script>
/* ============================================================================
 * 【內嵌資料】鏡像自 pipeline/write_xlsx.js v6（生成日 2026-07-20）＋03 Schema v1.2 摘要
 * 同步方式見檔頭註解：write_xlsx P1COLS 改版 → 更新 ENUMS / NOTE_MAP / buildP1Fields / MODULES
 * ==========================================================================*/
const GEN_META = {
  generatedAt: "2026-07-20",
  sourceVersion: "write_xlsx.js v6（U18 收編後）＋03_GoogleSheets_Schema_v1.md v1.2＋FrameTest section id（2026-07-20 現況）",
};

/* P4 枚舉鏡像（逐字鏡像 write_xlsx.js ENUMS；真相來源＝03 schema＋02 色彩規劃，勿在此新增值） */
const ENUMS = {
  "狀態": ["草稿","調修中","待建置","已建置"],
  "版型選擇": ["MVP-v1"],
  "模組位置": ["kv","featured-1","featured-2","featured-3","wall-1","wall-2","wall-3","wall-4","wall-5","promodeal","explore"],
  "標籤來源": ["offer","feature","無"],
  "顯示開關": ["是","否"],
  "hueFamily": ["pink-plum","gold-bronze","green-sage","blue-calm","mono"],
  "surfaceMode": ["light","dark"],
  "kvTitleStyle": ["vivid","deep"],
  "moduleBorderStyle": ["none","theme","black"],
  "labelStyle": ["deep-plate","bright-plate"],
  "colorTheme": ["mono-light"],
  "kvEyebrowCnMobile": ["auto","hide","show"],
  "promoSourceMode": ["auto","promo-activity","brand-recommend","product-fallback"],
  "kvVariant": ["kv-new","kv-legacy"],
  "categoryWallCount": ["3","4","5"],
};

/* 每欄一句話填寫說明（摘自 03_GoogleSheets_Schema_v1.md v1.2；規格真相在 03） */
const NOTE_MAP = {
  "A1":"系統自動編號＝頁面唯一 ID，不需填寫。",
  "A2":"活動頁名稱——AI 初稿後可自由改寫；對應 dock 主錨點短標（dockHeroLabel）。",
  "A3":"頁面狀態——切「待建置」＝人工核可建置（R2 定案，表內留紀錄）。",
  "A4":"流程起點——人工貼入來源頁 URL；域名限 tw.buy.yahoo.com，非法→warning 不建置。",
  "A5":"系統自動——指向 P3 策展列＋qa 快照檔。",
  "A6":"版型下拉——現僅 MVP-v1（擴充依 11 §9.3）。",
  "B1":"主題色相家族——AI 依色彩決策路由自動建議後可改；枚舉單一來源＝02 色彩規劃＋Figma variables。",
  "B2":"色彩主題——現定版 mono-light；其餘值 WP2b 定版後鏡像。",
  "B3":"明暗模式。",
  "B4":"KV 標題配色。",
  "B5":"模組線框樣式。",
  "B6":"標籤（chip）樣式。",
  "C1":"KV 拉丁眉標——AI 初稿＝品牌名；mobile 不直接顯示（跑馬燈帶出），欄位照填。",
  "C2":"KV 中文眉標——AI 初稿；mobile 顯示模式由表尾 C9 控制。",
  "C3":"KV 標題第一行——建議 ≤4 字（fit 自動縮字兜底）；含折扣數字→數字部分視同 🔒 驗真值。",
  "C4":"KV 標題第二行——折數＝真值互證（活動標題 vs 商品池實算最低折數）；數字部分 🔒。",
  "C5":"「起」字顯示——文案含折數→自動建議「是」；無優惠文案時不得顯示。",
  "C6":"活動日期——🔒 取 KV 主軸 actid 檔期，不得 AI 生成/手打；無真值→隱藏（降級鏈）。",
  "C6a":"KV 主軸活動 actid——🔒 來源真值。",
  "C7":"標題掀牌動畫開關——尊重 prefers-reduced-motion。",
  "C8":"跑馬燈開關——內容自動生成（眉標＋標題＋檔期）。",
  "C9":"mobile 中文眉標顯示——auto＝kv-offer-box 放不下自動隱藏（量測基準 430px／iPhone 16 Plus，U7）。",
  "D0":"KV 版型——kv-new（新版＝預設）｜kv-legacy（舊版）；拼法統一案掛裁決收斂會。",
  "D1":"KV 主圖（大圓）——預設＝該商品頁商品圖第二張 imageSet[1][0]（U10 白底語意）；可貼 URL 覆寫。",
  "D2":"KV 副圖1——同 D1 規則。",
  "D3":"KV 副圖2——同 D1 規則。",
  "D4":"KV 主打商品1 gdid——🔒 對應 KV 圓圖商品；名/價/URL 皆真值，縮寫名另欄（P2 G6c）。",
  "D5":"KV 主打商品2 gdid——同 D4。",
  "D6":"KV 主打商品3 gdid——同 D4。",
  "D7":"KV 主打商品1 商品頁 url——🔒 由 gdid 對應（與 P2 G9 同源）；改圖須成組連動（R12）。",
  "D8":"KV 主打商品2 商品頁 url——同 D7。",
  "D9":"KV 主打商品3 商品頁 url——同 D7。",
  "E0":"本期活動來源模式——auto＝取可滿足 ≥3 則的最高優先層（U19 單一來源制）；三層＝優惠活動→品牌推薦→商品替補；其餘值＝強制單一來源。",
  "E6":"本期活動模組 h2 標題——隨 AI 策展內容重寫、標題與內容同型（U19）；「本期活動」＝promo-truth 預設前綴、非固定文案；dock 短標另欄（dockPromoLabel）。",
  "E1":"入口標籤 chip——AI 初稿＝活動屬性詞；商品型入口僅限單品詞、禁優惠與檔期詞彙（裁決⑤）。",
  "E2":"入口文案——第三 chip 槽位語義＝日期/時效，勿混入屬性標籤。",
  "E3":"入口檔期——🔒 各 actid 獨立檔期；無真值→隱藏；商品型入口無檔期列；mobile 日期列一律隱藏。",
  "E4":"入口圖——預設＝該活動商品池第一件商品第一張圖（裁決②）；活動 banner 降為人工覆寫級。",
  "E5":"入口連結——🔒 actid 活動頁 URL；商品型入口可為 gdsale 商品頁 URL（僅限單品詞）。",
  "F1f":"樓層標題——AI 策展命名可改；自動連動 dock 錨點與頁尾；三樓層勿同名。",
  "F1w":"品類牆標題（牆4~8＝品類牆1~5，樓層編號連續制）——填寫即啟用該牆；實填數與 categoryWallCount 一致性＝機器閘檢（U18）。",
  "F1w-off":"品類牆標題（表尾附加欄）——值空＝未啟用；預設曝光 3 牆（U18）。",
  "F2":"樓層情境卡圖（最左第一格）——僅情境卡可換圖；商品卡恆抓商品圖。",
  "F3":"樓層情境卡文案——tag｜title｜sub 三段；促銷字串斷行注意（11 §6.3）。",
  "CTA":"頁面 CTA 文案——AI 初稿可修；✍️ 通則禁工程字串（U13）。",
  "GATE":"系統回填 gate.js 機器閘結果（PASS/FAIL＋WARN 數）；指紋綁定 draft/snapshot。",
  "CWC":"品類牆數量 3｜4｜5、預設 3（U18：至少曝光 3 組至多 5 組）——與實填牆標題數一致性＝機器閘檢；dock 錨點隨牆數連動。",
  "F4":"頁尾標題（v1.2 §8 提案欄、尚未入 P1 產表＝併 N-11 落地）——AI 依策展主題擬定、✍️ 可修；demo 已欄位驅動。",
  "F5":"注意事項內文（v1.2 §8 提案欄、尚未入 P1 產表＝併 N-11 落地）——多行＝儲存格內換行、建置端 pre-line 渲染、純文字不解析 HTML。",
};

/* P1COLS 鏡像建構（順序/欄名與 write_xlsx.js v6 逐字一致；示意基準＝4 入口×3 樓層×3 牆 canonical draft）
   —— 欄位總數與物理字母隨牆/樓層數浮動，以實際產出表頭定位（例：兩牆版 C9=BM、三牆版 C9=BN）。 */
function buildP1Fields(){
  const F = [];
  const add = (code, name, perm, group, note, enumName, tail) =>
    F.push({ code, name, perm, group, note, enumName: enumName || null, tail: !!tail });
  // A 管理與來源＋B 主題配色＋C KV 文案開關＋D KV 視覺（基礎段）
  add("A1","A1 頁面ID","sys","page",NOTE_MAP.A1);

function fieldRow(f, idx){
  const pos = (typeof idx === "number") ? `<span class="pos" title="P1 物理欄位置＝三樓層×三牆示意；實際字母隨牆/樓層數浮動，以實際表頭定位">${colLetter(idx + 1)}欄${f.tail ? "・表尾附加" : ""}</span>` : "";
  const enumTxt = f.enumName ? `<span class="enum">下拉（P4 ${esc(f.enumName)}）：${esc(ENUMS[f.enumName].join(" | "))}。</span>` : "";
  const ptag = f.proposal ? `<span class="ptag">v1.2 提案・未入產表</span>` : "";
  return `<div class="frow${f.proposal ? " proposal" : ""}" id="row-${f.code.replace(/\./g, "-")}" data-search="${esc((f.code + " " + f.name + " " + f.note).toLowerCase())}">
    <span class="fcode ${PERM_CLASS[f.perm]}" title="${f.perm === "sys" ? "系統欄" : f.perm}">${esc(f.code)}</span>
    <div class="fmain"><div class="fname">${esc(f.name)}${pos}${ptag}</div><div class="fnote">${enumTxt}${esc(f.note)}</div></div>
  </div>`;
}
function renderPanel(){
  const idxOf = new Map(P1_FIELDS.map((f, i) => [f.code, i]));
  const byGroup = (g) => P1_FIELDS.filter((f) => f.group === g);
  const html = GROUPS.map((G) => {
    let rows = "";
    if (G.fieldGroup === "p2") rows = P2_FIELDS.map((f) => fieldRow(f)).join("");
    else if (G.fieldGroup) {
      rows = byGroup(G.fieldGroup).map((f) => fieldRow(f, idxOf.get(f.code))).join("");
      rows += PROPOSAL_FIELDS.filter((f) => f.group === G.fieldGroup).map((f) => fieldRow(f)).join("");
    } else rows = PROPOSAL_FIELDS.filter((f) => f.group === G.id.replace(/^g-/, "")).map((f) => fieldRow(f)).join("");
    const linked = MODULES.some((m) => m.group === G.id && m.secId);
    return `<div class="gcard${linked ? " linked" : ""}" id="${G.id}">
      <div class="ghead" data-group="${G.id}">
        <span class="ord">${esc(G.ord)}</span><span class="gtitle">${esc(G.title)}</span>
        <span class="gbadge">${esc(G.badge)}</span><span class="jump">${linked ? "⇢ 點我捲到模組" : "（不標框）"}</span>
      </div>
      <div class="gnote">${esc(G.note)}</div>${rows}
    </div>`;
  }).join("");
  $("#groups").innerHTML = html + `<div class="foot">欄位定義鏡像自 write_xlsx.js P1COLS v6（生成日 ${GEN_META.generatedAt}）；填寫說明摘自 03 Schema v1.2。P1 欄位置＝三樓層×三牆 canonical 示意（例：兩牆版 C9=BM、三牆版 C9=BN），實際以產出表頭定位。本頁＝預覽版視覺對照，非過閘依據。</div>`;
  const nP = P1_FIELDS.length, nProp = PROPOSAL_FIELDS.length, nP2 = P2_FIELDS.length;
  $("#panel-stats").innerHTML = `P1 活動頁主表 <b>${nP} 欄</b>（＝write_xlsx P1COLS，三樓層×三牆示意）｜提案欄 <b>${nProp}</b>（F4/F5）｜P2 商品明細參考 <b>${nP2} 欄</b><br>來源：${esc(GEN_META.sourceVersion)}`;
  document.querySelectorAll(".ghead").forEach((h) => h.addEventListener("click", () => jumpToModule(h.dataset.group)));
}

/* ── 面板⇄檢視 互動 ── */
let hlTimer = null;
function highlightGroup(groupId, codes){
  document.querySelectorAll(".gcard.hl").forEach((el) => el.classList.remove("hl"));
  document.querySelectorAll(".frow.hl").forEach((el) => el.classList.remove("hl"));
  const card = document.getElementById(groupId);
  if (!card) return;
  card.classList.add("hl");
  (codes || []).forEach((c) => { const r = document.getElementById("row-" + c.replace(/\./g, "-")); if (r) r.classList.add("hl"); });
  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  clearTimeout(hlTimer);
  hlTimer = setTimeout(() => { card.classList.remove("hl"); document.querySelectorAll(".frow.hl").forEach((el) => el.classList.remove("hl")); }, 2600);
}
function jumpToModule(groupId){
  const mods = MODULES.filter((m) => m.group === groupId && m.secId);
  if (!mods.length) return;
  const m = mods[0];
  if (state.mode === "iframe" && state.annotated && frameDoc) {
    const el = frameDoc.getElementById(m.secId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    flashBox(m.secId);
  } else if (state.mode === "shots") {
    const box = document.querySelector(`.obox[data-sec="${m.secId}"]`);
    if (box) {
      const v = $("#viewer");
      v.scrollTo({ top: box.offsetTop + $("#stage").offsetTop - 60, behavior: "smooth" });
      flashBox(m.secId);
    }
  }
}
function flashBox(secId){
  const box = document.querySelector(`.obox[data-sec="${secId}"]`);
  if (!box) return;
  box.classList.remove("flash"); void box.offsetWidth; box.classList.add("flash");
  setTimeout(() => box.classList.remove("flash"), 1700);
}

/* ── 標註框建構（兩模式共用 DOM，位置演算不同） ── */
function buildBoxes(){
  $("#overlay").innerHTML = MODULES.filter((m) => m.secId).map((m) => `
    <div class="obox" data-sec="${m.secId}" data-group="${m.group}" style="display:none">
      <span class="obadge" title="hover＝面板高亮；點擊＝捲到欄位組"><b>${esc(m.label)}</b>｜${esc(m.badge)}</span>
    </div>`).join("");
  document.querySelectorAll(".obadge").forEach((b) => {
    const box = b.parentElement;
    const act = () => { document.querySelectorAll(".obox.hot").forEach((x) => x.classList.remove("hot")); box.classList.add("hot");
      const m = MODULES.find((x) => x.secId === box.dataset.sec);
      highlightGroup(box.dataset.group, m && m.codes); };
    b.addEventListener("mouseenter", act);
    b.addEventListener("click", act);
    b.addEventListener("mouseleave", () => setTimeout(() => box.classList.remove("hot"), 900));
  });
}

/* ── iframe 同源標註模式 ── */
function scheduleLayout(){ if (rafPending) return; rafPending = true; requestAnimationFrame(() => { rafPending = false; layoutIframeBoxes(); }); }
function sizeFrame(){ $("#frame").style.height = Math.max(320, $("#viewer").clientHeight - 28) + "px"; }
function layoutIframeBoxes(){
  if (!(state.mode === "iframe" && state.annotated && frameDoc)) return;
  const fh = $("#frame").clientHeight;
  MODULES.filter((m) => m.secId).forEach((m) => {
    const box = document.querySelector(`.obox[data-sec="${m.secId}"]`);
    const el = frameDoc.getElementById(m.secId);
    if (!el) { box.style.display = "none"; return; }
    const r = el.getBoundingClientRect();
    if (r.bottom < 30 || r.top > fh - 10 || r.height < 2) { box.style.display = "none"; return; }
    let top = r.top, h = r.height;
    if (top < 0) { h += top; top = 0; } // 上緣被捲出時貼齊 0，讓左上角徽章恆可見
    Object.assign(box.style, { display: "block", left: r.left + "px", top: top + "px", width: r.width + "px", height: h + "px" });
  });
}
function detachFrame(){
  if (frameWin) { try { frameWin.removeEventListener("scroll", scheduleLayout); frameWin.removeEventListener("resize", scheduleLayout); } catch {} }
  frameDoc = frameWin = null; state.annotated = false;
  clearInterval(layoutTimer);
  document.querySelectorAll(".obox").forEach((b) => { b.style.display = "none"; });
}
function buildFrameSrc(){
  try {
    const u = new URL(state.baseUrl, location.href);
    if (state.dataset !== "lecreuset") u.searchParams.set("dataset", state.dataset); else u.searchParams.delete("dataset");
    if (state.device === "mobile") u.searchParams.set("device", "mobile"); else u.searchParams.delete("device");
    return u.href;
  } catch { return state.baseUrl; }
}
function loadIframe(){
  detachFrame();
  state.mode = "iframe";
  syncModeUI();
  $("#frame").hidden = false; $("#shot-img").hidden = true;
  sizeFrame();
  setStatus("載入 iframe 中…（" + esc(buildFrameSrc()) + "）", true);
  clearTimeout(loadTimer);
  loadTimer = setTimeout(() => { if (!state.annotated) fallbackToShots("iframe 載入逾時（12 秒）——可能被拒絕嵌入或網路不可達。"); }, 12000);
  $("#frame").src = buildFrameSrc();
}
function onFrameLoad(){
  clearTimeout(loadTimer);
  setTimeout(() => {
    let doc = null;
    try { doc = $("#frame").contentDocument; } catch {}
    if (doc && doc.getElementById("sec-hero")) {
      frameDoc = doc; frameWin = $("#frame").contentWindow;
      state.annotated = true;
      frameWin.addEventListener("scroll", scheduleLayout, { passive: true });
      frameWin.addEventListener("resize", scheduleLayout, { passive: true });
      clearInterval(layoutTimer);
      layoutTimer = setInterval(scheduleLayout, 1000); // 慢速補算：iframe 內圖片載入/資料重繪造成的版位漂移
      scheduleLayout();
      setStatus(`同源標註模式✔｜資料集 ${DATASET_LABEL[state.dataset]}｜${state.device}｜hover 框上徽章⇄面板互查`);
    } else if (doc) {
      setStatus("iframe 已載入，但頁內找不到 sec-hero——請確認網址是否為 FrameTest 活動頁。", true);
    } else {
      fallbackToShots("iframe 屬跨域（或 file:// 安全限制），無法讀取內部模組位置。");
    }
  }, 350);
}
function fallbackToShots(reason){
  detachFrame();
  enterShots();
  setStatus(`已自動退回截圖模式（近似標註）——${reason} 同源即時標註需部署後以相對路徑載入（預設「線上同源」preset）。`, true);
}

/* ── 截圖模式 ── */
function enterShots(){
  state.mode = "shots";
  syncModeUI();
  clearTimeout(loadTimer);
  $("#frame").hidden = true; $("#frame").removeAttribute("src");
  const view = RECTS.views[state.device];
  const img = $("#shot-img");
  img.hidden = false;
  img.src = view.file.startsWith("shots/") ? view.file : "shots/" + view.file;
  layoutShotBoxes();
  const dsNote = state.dataset !== RECTS.dataset ? `——注意：截圖快照僅 ${DATASET_LABEL[RECTS.dataset]}（拍攝 ${RECTS.capturedAt.slice(0, 10)}），資料集切換請待部署後用 iframe 模式` : `（快照＝${DATASET_LABEL[RECTS.dataset]}，拍攝 ${RECTS.capturedAt.slice(0, 10)}）`;
  setStatus(`截圖模式｜標註框＝近似比例定位（以拍攝當日量測）${dsNote}`, state.dataset !== RECTS.dataset);
}
function layoutShotBoxes(){
  if (state.mode !== "shots") return;
  const view = RECTS.views[state.device];
  MODULES.filter((m) => m.secId).forEach((m) => {
    const box = document.querySelector(`.obox[data-sec="${m.secId}"]`);
    const s = view.sections[m.secId];
    if (!s) { box.style.display = "none"; return; }
    Object.assign(box.style, { display: "block", left: (s.frac.left * 100) + "%", top: (s.frac.top * 100) + "%", width: (s.frac.w * 100) + "%", height: (s.frac.h * 100) + "%" });
  });
}

/* ── 工具列/狀態 ── */
function setStatus(html, warn){
  $("#status-text").innerHTML = html;
  $("#status-bar").classList.toggle("warn", !!warn);
}
function syncModeUI(){
  document.querySelectorAll("#seg-mode button").forEach((b) => b.classList.toggle("on", b.dataset.mode === state.mode));
  document.querySelectorAll("#seg-dataset button").forEach((b) => b.classList.toggle("on", b.dataset.ds === state.dataset));
  document.querySelectorAll("#seg-device button").forEach((b) => b.classList.toggle("on", b.dataset.dev === state.device));
  $("#stage").className = state.device;
}
function applyMode(){
  if (state.mode === "iframe") loadIframe(); else enterShots();
}

$("#frame").addEventListener("load", () => { if ($("#frame").src) onFrameLoad(); });
window.addEventListener("resize", () => { if (state.mode === "iframe") sizeFrame(); scheduleLayout(); }, { passive: true });
$("#preset-online").addEventListener("click", () => { $("#url-input").value = PRESET_ONLINE; state.baseUrl = PRESET_ONLINE; state.mode = "iframe"; applyMode(); });
$("#preset-local").addEventListener("click", () => { $("#url-input").value = PRESET_LOCAL; state.baseUrl = PRESET_LOCAL; state.mode = "iframe"; applyMode(); });
$("#btn-load").addEventListener("click", () => { state.baseUrl = $("#url-input").value.trim() || PRESET_ONLINE; state.mode = "iframe"; applyMode(); });
$("#url-input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#btn-load").click(); });
$("#seg-mode").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; state.mode = b.dataset.mode; applyMode(); });
$("#seg-dataset").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; state.dataset = b.dataset.ds; applyMode(); });
$("#seg-device").addEventListener("click", (e) => { const b = e.target.closest("button"); if (!b) return; state.device = b.dataset.dev; applyMode(); });
$("#field-search").addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".frow").forEach((r) => r.classList.toggle("dim", !!q && !r.dataset.search.includes(q)));
  document.querySelectorAll(".gcard").forEach((g) => {
    const rows = g.querySelectorAll(".frow");
    const hasHit = !q || !rows.length ? true : [...rows].some((r) => !r.classList.contains("dim"));
    g.style.display = hasHit ? "" : "none";
  });
});

/* ── INIT ── */
renderPanel();
buildBoxes();
$("#url-input").value = PRESET_ONLINE;
if (location.protocol === "file:") {
  // file://：iframe 同源讀取受瀏覽器安全限制 → 預設直接進截圖模式（近似標註）；仍可按「本機檔案」preset 試載 iframe（無標註時自動退回）
  enterShots();
  setStatus("本機 file:// 開啟——已用截圖模式（近似標註）。部署後（同源）自動可用 iframe 即時標註；本機想看 iframe 可按「預設：本機檔案」載入（瀏覽器安全限制下會自動退回截圖模式）。", true);
} else {
  loadIframe();
}
// 部署環境：以最新拍攝的 rects.json 蓋掉內嵌近似值（file:// fetch 會失敗＝吃內嵌值，靜默略過）
if (location.protocol !== "file:") {
  fetch("shots/rects.json").then((r) => (r.ok ? r.json() : null)).then((j) => {
    if (j && j.views) {
      j.views.desktop.file = "shots/" + (j.views.desktop.file || "desktop-1200.png").replace(/^shots\//, "");
      j.views.mobile.file = "shots/" + (j.views.mobile.file || "mobile-390.png").replace(/^shots\//, "");
      RECTS = j;
      if (state.mode === "shots") { enterShots(); }
    }
  }).catch(() => {});
}
</script>
